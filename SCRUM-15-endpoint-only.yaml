openapi: 3.0.3
info:
  title: Update GET /api/tasks
  description: As a developer, I want to update GET /api/tasks to improve functionality
    and meet new requirements.
  version: 1.0.0
  x-jira-issue: SCRUM-15
servers:
- url: https://api.example.com/v1
  description: Production
- url: https://staging-api.example.com/v1
  description: Staging
paths:
  /api/tasks:
    get:
      summary: Update GET /api/tasks
      description: 'As a developer, I want to update GET /api/tasks to improve functionality
        and meet new requirements.


        **Validation rules:**

        - Requesting size > 100 returns 400 Bad Request


        **Acceptance criteria:**

        GET /api/tasks?page=0&size=5 returns at most 5 tasks

        GET /api/tasks?sort=dueDate,asc returns tasks sorted by due date ascending

        GET /api/tasks?status=TODO returns only TODO tasks'
      operationId: getApiTasks
      tags:
      - Task
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageTask'
        '400':
          description: Bad request — validation error
        '401':
          description: Unauthorized
        '500':
          description: Internal server error
      parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
          default: 0
      - name: size
        in: query
        required: false
        schema:
          type: integer
          default: 20
          maximum: 100
      - name: sort
        in: query
        required: false
        schema:
          type: string
        example: createdAt,desc
components:
  schemas:
    PageTask:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/TaskResponse'
        totalElements:
          type: integer
        totalPages:
          type: integer
        number:
          type: integer
        size:
          type: integer
    TaskResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique resource identifier
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
security:
- BearerAuth: []
tags:
- name: Task
  description: Operations on Task resources
